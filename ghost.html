<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Spatiotemporal Ghost Map Portfolio Element</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body { 
            background-color: #262626; 
            margin: 0; 
            padding: 0; 
            width: 100vw;
            height: 100vh; 
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
        }
        .dashboard-card { 
            background-color: #262626; 
            width: 100%;
            height: 100vh; 
            display: flex;
            flex-direction: column;
            padding: 16px; 
            box-sizing: border-box;
        }
        .card-title { color: #D9DDD9; font-size: 16px; font-weight: bold; margin-bottom: 2px; } 
        .card-subtitle { color: #878578; font-size: 11px; margin-bottom: 12px; } 
        .map-container { 
            width: 100%; 
            flex-grow: 1; 
            border-radius: 4px; 
            overflow: hidden; 
            border: 1px solid #50563f; 
            position: relative; 
        }
        #map { width: 100%; height: 100%; background-color: #262626; }
        
        .dynamic-legend {
            background: rgba(38, 38, 38, 0.95);
            border: 1px solid #50563f;
            padding: 12px;
            border-radius: 4px;
            color: #D9DDD9;
            font-size: 11px;
            max-height: 220px;
            width: 160px;
            overflow-y: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            line-height: 1.6;
        }
        .legend-header {
            font-weight: bold;
            border-bottom: 1px solid #50563f;
            margin-bottom: 6px;
            padding-bottom: 3px;
            color: #878578;
            text-transform: uppercase;
            font-size: 9.5px;
            letter-spacing: 0.5px;
        }
        .legend-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: monospace;
            font-size: 11.5px;
        }
        .legend-swatch {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .legend-empty {
            color: #878578;
            font-style: italic;
        }

        .control-panel {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #262626;
            padding: 12px 0 0 0;
        }
        .play-btn {
            background-color: #50563f; 
            border: 1px solid #50563f;
            color: #D9DDD9; 
            padding: 8px 16px;
            font-weight: bold;
            font-size: 11px;
            border-radius: 3px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: background 0.2s, color 0.2s;
        }
        .play-btn:hover { 
            background-color: #D9DDD9;
            color: #262626;
        }
        .timeline-slider {
            flex-grow: 1;
            accent-color: #50563f; 
        }
        .time-display {
            color: #D9DDD9; 
            font-size: 13px;
            font-weight: bold;
            min-width: 90px;
            text-align: right;
        }
        .leaflet-bar a {
            background-color: #333333 !important;
            color: #e9e2dc !important;
            border-bottom: 1px solid #50563f !important;
        }
        .leaflet-bar a:hover {
            background-color: #444444 !important;
            color: #ffffff !important;
        }
        
        .leaflet-tooltip {
            font-size: 11px !important;
            font-weight: bold !important;
            border-radius: 4px !important;
            padding: 5px 8px !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4) !important;
        }
    </style>
</head>

        const map = L.map('map', {
            zoomControl: true, scrollWheelZoom: true, doubleClickZoom: true,
            dragging: true, boxZoom: true, touchZoom: true, keyboard: true
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        map.fitBounds([ [59.75992928, 20.847316000000003], [60.60806572, 23.066079] ]);

        const canvasRenderer = L.canvas();
        const markerLayerGroup = L.layerGroup().addTo(map);

        const dynamicLegendControl = L.control({ position: 'bottomleft' });
        dynamicLegendControl.onAdd = function() {
            const div = L.DomUtil.create('div', 'dynamic-legend');
            div.id = 'liveTrackerLegend';
            div.innerHTML = '<div class="legend-header">Active Trackers</div><div class="legend-empty">Loading...</div>';
            return div;
        };
        dynamicLegendControl.addTo(map);

        let dayCounterIndex = 0;
        let isPlaying = false;
        let animationTimer = null;

        function drawGhostFrame(targetDayIndex) {
            if (targetDayIndex >= calendarTimeline.length) return;

            const targetDateString = calendarTimeline[targetDayIndex];
            document.getElementById('timeDisplay').innerText = targetDateString;

            markerLayerGroup.clearLayers();
            let activeIDsThisFrame = [];

            for (let animalId in trackingData) {
                const info = trackingData[animalId];
                const lookup = info.calendar_lookup;
                
                let historicalCoordinates = [];
                let latestPoint = null;

                for (let d = 0; d <= targetDayIndex; d++) {
                    let checkDateStr = calendarTimeline[d];
                    if (lookup.hasOwnProperty(checkDateStr)) {
                        let pt = lookup[checkDateStr];
                        historicalCoordinates.push([pt.lat, pt.lon]);
                        
                        if (d === targetDayIndex) {
                            latestPoint = pt;
                        }
                    }
                }

                if (historicalCoordinates.length >= 2 && lookup.hasOwnProperty(targetDateString)) {
                    L.polyline(historicalCoordinates, {
                        renderer: canvasRenderer,
                        color: info.color,
                        weight: 2.2,
                        opacity: 0.40,
                        lineCap: 'round',
                        lineJoin: 'round'
                    }).addTo(markerLayerGroup);
                }

                if (latestPoint && lookup.hasOwnProperty(targetDateString)) {
                    let dotRadius = latestPoint.on_water ? 5.5 : 3.5;
                    
                    L.circleMarker([latestPoint.lat, latestPoint.lon], {
                        renderer: canvasRenderer,
                        radius: dotRadius,
                        fillColor: info.color,
                        fillOpacity: 1.0,
                        color: info.color,
                        weight: 1.0,
                        opacity: 1.0
                    }).addTo(markerLayerGroup);
                    
                    activeIDsThisFrame.push({ id: animalId, color: info.color });
                }
            }

            updateLiveTrackerLegend(activeIDsThisFrame);
        }

        function updateLiveTrackerLegend(activeAnimals) {
            const legendDiv = document.getElementById('liveTrackerLegend');
            if (!legendDiv) return;

            let htmlPayload = '<div class="legend-header">Active Trackers</div>';
            if (activeAnimals.length === 0) {
                htmlPayload += '<div class="legend-empty">No active vectors</div>';
            } else {
                activeAnimals.sort((a, b) => a.id.localeCompare(b.id, undefined, {numeric: true}));
                activeAnimals.forEach(item => {
                    // Safely isolated JavaScript string template components by escaping braces from f-string compilation
                    htmlPayload += `
                        <div class="legend-row">
                            <span class="legend-swatch" style="background:${item.color};"></span>
                            <span>ID: ${item.id}</span>
                        </div>`;
                });
            }
            legendDiv.innerHTML = htmlPayload;
        }

        function toggleAnimation() {
            if (isPlaying) {
                clearInterval(animationTimer);
                document.getElementById('playBtn').innerText = "PLAY SEQUENCE";
                isPlaying = false;
            } else {
                document.getElementById('playBtn').innerText = "PAUSE CLOCK";
                isPlaying = true;
                animationTimer = setInterval(() => {
                    dayCounterIndex++;
                    if (dayCounterIndex >= calendarTimeline.length) dayCounterIndex = 0;
                    document.getElementById('timeSlider').value = dayCounterIndex;
                    drawGhostFrame(dayCounterIndex);
                }, 200);
            }
        }

        function manualTimeSeek(value) {
            dayCounterIndex = parseInt(value);
            drawGhostFrame(dayCounterIndex);
        }

        setTimeout(() => { drawGhostFrame(0); }, 500);
    </script>
