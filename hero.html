            background-color: #262626; gap: 15px; padding: 10px; box-sizing: border-box;
        }
        .independent-wrapper {
            flex: 1; height: 100%; display: flex; flex-direction: column;
            background-color: #262626; box-shadow: 0 15px 50px rgba(0,0,0,0.5); 
            border-radius: 6px; overflow: hidden; border: 1px solid #50563f; 
        }
        .map-panel {
            position: relative; width: 100%; flex-grow: 1; background: #262626;
        }
        canvas { display: block; width: 100%; height: 100%; }
        .ui-panel {
            position: absolute; top: 15px; left: 15px; background: rgba(38, 38, 38, 0.92); 
            backdrop-filter: blur(4px); padding: 12px 16px; border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 10; pointer-events: none; 
            min-width: 210px; border: 1px solid #50563f;
        }
        .ui-panel h3 { margin: 0 0 4px 0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; }
        .ui-panel .stats { font-size: 11px; color: #878578; font-family: monospace; line-height: 1.4; } 
        
        .controls-top-right {
            position: absolute; top: 15px; right: 15px; z-index: 10;
            display: flex; flex-direction: column; gap: 8px; width: 100px;
        }
        .toggle-btn {
            background: rgba(38, 38, 38, 0.8); backdrop-filter: blur(4px);
            padding: 7px 12px; border-radius: 3px; border-width: 1px; border-style: solid;
            cursor: pointer; font-weight: bold; font-size: 9px; letter-spacing: 0.5px; 
            text-transform: uppercase; transition: all 0.15s; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-align: center; width: 100%; box-sizing: border-box;
        }
        .toggle-btn:hover { background: rgba(50, 50, 50, 0.9); }
        
        .control-bar {
            position: relative; width: 100%; box-sizing: border-box; background: #262626; 
            padding: 14px 20px; border-top: 1px solid #50563f; display: flex; align-items: center; gap: 15px; z-index: 10;
        }
        .play-btn {
            color: #262626; border: none; padding: 8px 16px; border-radius: 3px; cursor: pointer; 
            font-weight: bold; font-size: 10px; letter-spacing: 0.8px; text-transform: uppercase; 
            transition: opacity 0.15s; min-width: 75px;
        }
        .play-btn:hover { opacity: 0.9; }
        
        .timeline-slider { flex-grow: 1; cursor: pointer; height: 4px; }
        .master-clock { font-family: monospace; font-size: 12px; color: #D9DDD9; font-weight: bold; min-width: 120px; text-align: right; letter-spacing: 0.5px; }
    </style>

        const engine = {};

        Object.keys(subjects).forEach(id => {
            const canvas = document.getElementById(`canvas-${id}`);
            const ctx = canvas.getContext('2d');
            
            const bgBaseImg = new Image();
            const bgHeatImg = new Image();
            bgBaseImg.src = subjects[id].bg_base;
            bgHeatImg.src = subjects[id].bg_heat;
            
            engine[id] = {
                canvas: canvas,
                ctx: ctx,
                bg_base: bgBaseImg,
                bg_heat: bgHeatImg,
                timeline: subjects[id].timeline,
                currentFrame: 0,
                isPlaying: false,
                showHeatmap: true,  
                loopInterval: null,
                isFast: true, 
                playbackSpeed: 130,
                slider: document.getElementById(`slider-${id}`),
                btn: document.getElementById(`play-${id}`),
                heatBtn: document.getElementById(`toggle-heat-${id}`),
                speedBtn: document.getElementById(`toggle-speed-${id}`),
                clock: document.getElementById(`clock-${id}`),
                stats: document.getElementById(`stats-${id}`)
            };

            engine[id].slider.max = engine[id].timeline.length - 1;

            // Wait for both images to load before rendering
            let loadedImages = 0;
            const checkLoad = () => {
                loadedImages++;
                if (loadedImages === 2) resizeCanvas(id);
            };
            bgBaseImg.onload = checkLoad;
            bgHeatImg.onload = checkLoad;

            engine[id].slider.addEventListener('input', (e) => {
                engine[id].currentFrame = parseInt(e.target.value);
                drawMap(id);
            });

            engine[id].btn.addEventListener('click', () => {
                togglePlayback(id);
            });

            // Heatmap Toggle Logic
            engine[id].heatBtn.addEventListener('click', () => {
                engine[id].showHeatmap = !engine[id].showHeatmap;
                if (engine[id].showHeatmap) {
                    engine[id].heatBtn.innerHTML = "HEATMAP: ON";
                    engine[id].heatBtn.style.color = subjects[id].color;
                    engine[id].heatBtn.style.borderColor = subjects[id].color;
                } else {
                    engine[id].heatBtn.innerHTML = "HEATMAP: OFF";
                    engine[id].heatBtn.style.color = "#878578"; // Dim when off
                    engine[id].heatBtn.style.borderColor = "#50563f";
                }
                drawMap(id);
            });

            // Speed Toggle Logic
            engine[id].speedBtn.addEventListener('click', () => {
                engine[id].isFast = !engine[id].isFast;
                engine[id].playbackSpeed = engine[id].isFast ? 130 : 400; // 130ms Fast, 400ms Slow
                
                if (engine[id].isFast) {
                    engine[id].speedBtn.innerHTML = "SPEED: FAST";
                    engine[id].speedBtn.style.color = subjects[id].color;
                    engine[id].speedBtn.style.borderColor = subjects[id].color;
                } else {
                    engine[id].speedBtn.innerHTML = "SPEED: SLOW";
                    engine[id].speedBtn.style.color = "#878578"; // Dim when off
                    engine[id].speedBtn.style.borderColor = "#50563f";
                }
                
                // Live update interval if currently playing
                if (engine[id].isPlaying) {
                    clearInterval(engine[id].loopInterval);
                    engine[id].loopInterval = setInterval(() => {
                        engine[id].currentFrame++;
                        if (engine[id].currentFrame >= engine[id].timeline.length) engine[id].currentFrame = 0;
                        engine[id].slider.value = engine[id].currentFrame;
                        drawMap(id);
                    }, engine[id].playbackSpeed);
                }
            });
        });

        function resizeCanvas(id) {
            const canvas = engine[id].canvas;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            drawMap(id);
        }

        function windowResizeHandler() {
            Object.keys(subjects).forEach(id => { resizeCanvas(id); });
        }

        function getXY(id, xMetric, yMetric, canvas) {
            const bbox = subjects[id].bbox;
            const x = ((xMetric - bbox.minX) / (bbox.maxX - bbox.minX)) * canvas.width;
            const y = canvas.height - (((yMetric - bbox.minY) / (bbox.maxY - bbox.minY)) * canvas.height);
            return { x, y };
        }

        function drawMap(id) {
            const inst = engine[id];
            if (!inst.canvas.width || !inst.bg_base.complete || !inst.bg_heat.complete) return;

            const ctx = inst.ctx;
            const canvas = inst.canvas;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const activeBg = inst.showHeatmap ? inst.bg_heat : inst.bg_base;
            ctx.drawImage(activeBg, 0, 0, canvas.width, canvas.height);

            const activeTimeStr = inst.timeline[inst.currentFrame];
            const trailingPoints = [];
            
            let searchTick = inst.currentFrame - 1;
            while (searchTick >= 0 && trailingPoints.length < 5) {
                const timeKey = inst.timeline[searchTick];
                const record = subjects[id].data[timeKey];
                if (record) {
                    trailingPoints.unshift(record);
                }
                searchTick--;
            }

            if (trailingPoints.length >= 2) {
                const stepRange = trailingPoints.length - 1;

                // PASS 1: Draw ALL White Outer Edges first to prevent overlapping artifacts
                for (let i = 0; i < stepRange; i++) {
                    const ptA = getXY(id, trailingPoints[i].x, trailingPoints[i].y, canvas);
                    const ptB = getXY(id, trailingPoints[i+1].x, trailingPoints[i+1].y, canvas);
                    const opacity = 0.20 + 0.50 * (i / Math.max(1, stepRange - 1));

                    ctx.beginPath();
                    ctx.moveTo(ptA.x, ptA.y);
                    ctx.lineTo(ptB.x, ptB.y);
                    
                    ctx.strokeStyle = '#FFFFFF';
                    ctx.lineWidth = 6.0;
                    ctx.lineCap = 'round';
                    ctx.globalAlpha = opacity * 0.4; // Softer white edge
                    ctx.stroke();
                }

                // PASS 2: Draw ALL Colored Inner Cores on top
                for (let i = 0; i < stepRange; i++) {
                    const ptA = getXY(id, trailingPoints[i].x, trailingPoints[i].y, canvas);
                    const ptB = getXY(id, trailingPoints[i+1].x, trailingPoints[i+1].y, canvas);
                    const opacity = 0.20 + 0.50 * (i / Math.max(1, stepRange - 1));

                    ctx.beginPath();
                    ctx.moveTo(ptA.x, ptA.y);
                    ctx.lineTo(ptB.x, ptB.y);
                    
                    ctx.strokeStyle = subjects[id].color;
                    ctx.lineWidth = 3.0;
                    ctx.lineCap = 'round';
                    ctx.globalAlpha = opacity;
                    ctx.stroke();
                }
            }
            ctx.globalAlpha = 1.0;

            inst.clock.innerText = activeTimeStr;
            const activeRecord = subjects[id].data[activeTimeStr];
            if (activeRecord) {
                inst.stats.innerHTML = `LAT: ${activeRecord.lat.toFixed(4)}°N<br>LON: ${activeRecord.lon.toFixed(4)}°E`;
                
                const dotPt = getXY(id, activeRecord.x, activeRecord.y, canvas);
                
                ctx.beginPath();
                ctx.arc(dotPt.x, dotPt.y, 7, 0, 2 * Math.PI);
                ctx.fillStyle = '#FFFFFF';
                ctx.shadowBlur = 10;
                ctx.shadowColor = subjects[id].color;
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(dotPt.x, dotPt.y, 4, 0, 2 * Math.PI);
                ctx.fillStyle = subjects[id].color;
                ctx.fill();
                
                ctx.shadowBlur = 0;
            } else {
                inst.stats.innerHTML = `<span style="color:#878578; font-style:italic;">Loading...</span>`;
            }
        }

        function togglePlayback(id) {
            const inst = engine[id];
            if (inst.isPlaying) {
                clearInterval(inst.loopInterval);
                inst.btn.innerHTML = "PLAY";
            } else {
                inst.btn.innerHTML = "PAUSE";
                inst.loopInterval = setInterval(() => {
                    inst.currentFrame++;
                    if (inst.currentFrame >= inst.timeline.length) inst.currentFrame = 0;
                    inst.slider.value = inst.currentFrame;
                    drawMap(id);
                }, inst.playbackSpeed);
            }
            inst.isPlaying = !inst.isPlaying;
        }

        window.addEventListener('resize', windowResizeHandler);
    </script>
