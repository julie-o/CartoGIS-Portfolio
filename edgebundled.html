            "#7D855C", // 4
            "#BFA63A", // 5
            "#DCD0A7", // 6
            "#e9e2dc"  // 7
        ];

        const weights = edgeMatrix.map(e => e.weight);
        const maxW = weights.length > 0 ? Math.max(...weights) : 1;
        const minW = weights.length > 0 ? Math.min(...weights) : 1;

        const logMin = Math.log(minW);
        const logMax = Math.log(maxW);
        const logRange = logMax - logMin;

        function valAtRatio(ratio) {
            const rawVal = Math.exp(logMin + ratio * logRange);
            if (rawVal <= 1.2) return 1;
            if (rawVal <= 2.5) return 2;
            if (rawVal <= 5.5) return 5;
            if (rawVal <= 12.0) return 10;
            if (rawVal <= 22.0) return 20;
            if (rawVal <= 35.0) return 30;
            return Math.round(rawVal);
        }

        // Pre-compute the exact bins to be used universally
        const thresholds = [
            valAtRatio(0.0 / 6.0),
            valAtRatio(1.0 / 6.0),
            valAtRatio(2.0 / 6.0),
            valAtRatio(3.0 / 6.0),
            valAtRatio(4.0 / 6.0),
            valAtRatio(5.0 / 6.0),
            valAtRatio(6.0 / 6.0)
        ];

        // FIX: Match the path color strictly to the explicit thresholds instead of purely math ratio
        function getColorForWeight(w) {
            for (let i = 6; i >= 0; i--) {
                if (w >= thresholds[i]) return steps[i];
            }
            return steps[0];
        }

        edgeMatrix.forEach(edge => {
            let p1 = islandMap[edge.origin];
            let p2 = islandMap[edge.destination];
            let cp = edge.control;
            
            if (p1 && p2 && cp) {
                let curveCoords = getBezierPoints(p1, p2, cp);
                let color = getColorForWeight(edge.weight);
                
                let pathLine = L.polyline(curveCoords, { 
                    color: color, 
                    weight: 5.0, 
                    opacity: 1.0, 
                    lineCap: 'round' 
                }).addTo(map);

                pathLine.bindTooltip(`Movements: ${edge.weight}`, {
                    sticky: true,
                    direction: 'top',
                    opacity: 0.95,
                    style: `background-color: #262626; color: ${color};`
                });

                pathLine.on('mouseover', function () {
                    this.setStyle({ weight: 8.0 });
                });
                pathLine.on('mouseout', function () {
                    this.setStyle({ weight: 5.0 });
                });
            }
        });

        for (let name in islandMap) { L.circleMarker(islandMap[name], { radius: 1.2, color: 'rgba(217,221,217,0.15)', fillColor: '#e9e2dc', fillOpacity: 0.5, weight: 1 }).addTo(map); }

        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function() {
            const div = L.DomUtil.create('div', 'legend');
            
            function formatRange(min, max, isLast) {
                if (isLast) return min + "+";
                if (min >= max - 1) return min.toString();
                return min + "-" + (max - 1);
            }

            const r1 = formatRange(thresholds[0], thresholds[1], false);
            const r2 = formatRange(thresholds[1], thresholds[2], false);
            const r3 = formatRange(thresholds[2], thresholds[3], false);
            const r4 = formatRange(thresholds[3], thresholds[4], false);
            const r5 = formatRange(thresholds[4], thresholds[5], false);
            const r6 = formatRange(thresholds[5], thresholds[6], false);
            const r7 = formatRange(thresholds[6], null, true);

            div.innerHTML = `
                <div class="legend-title">Flow Volume Between Island Pair</div>
                <div class="legend-subtitle">Number of observed movements between island pairs (2019-2024)</div>
                
                <div class="legend-bar-container">
                    <div class="bar-seg" style="background:#3E3425;" title="${r1} movements"></div>
                    <div class="bar-seg" style="background:#65543D;" title="${r2} movements"></div>
                    <div class="bar-seg" style="background:#52583F;" title="${r3} movements"></div>
                    <div class="bar-seg" style="background:#7D855C;" title="${r4} movements"></div>
                    <div class="bar-seg" style="background:#BFA63A;" title="${r5} movements"></div>
                    <div class="bar-seg" style="background:#DCD0A7;" title="${r6} movements"></div>
                    <div class="bar-seg" style="background:#e9e2dc;" title="${r7} movements"></div>
                </div>
                <div class="legend-labels-grid">
                    <span>${r1}</span>
                    <span>${r2}</span>
                    <span>${r3}</span>
                    <span>${r4}</span>
                    <span>${r5}</span>
                    <span>${r6}</span>
                    <span>${r7}</span>
                </div>
            `;
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
